apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: server
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: server
  path: .
  prune: true
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: apps/v1
      kind: StatefulSet
      name: postgresql
      namespace: server
    - apiVersion: apps/v1
      kind: StatefulSet
      name: mysql
      namespace: server
    - apiVersion: apps/v1
      kind: StatefulSet
      name: mariadb
      namespace: server
    - apiVersion: apps/v1
      kind: Deployment
      name: redis
      namespace: server
