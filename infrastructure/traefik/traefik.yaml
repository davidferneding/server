apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-acme
  namespace: server
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: server
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-logs
  namespace: server
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: server
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  namespace: server
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
        app.kubernetes.io/component: ingress
        app.kubernetes.io/part-of: server
    spec:
      serviceAccountName: traefik
      containers:
        - name: traefik
          image: traefik:v3.6.15
          args: ["--configfile=/etc/traefik/traefik.yaml"]
          ports:
            - containerPort: 443
              name: websecure
            - containerPort: 8082
              name: metrics
          env:
            - name: PORKBUN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: traefik-secret
                  key: PORKBUN_API_KEY
            - name: PORKBUN_SECRET_API_KEY
              valueFrom:
                secretKeyRef:
                  name: traefik-secret
                  key: PORKBUN_SECRET_API_KEY
          volumeMounts:
            - name: config
              mountPath: /etc/traefik/
            - name: secrets
              mountPath: /etc/traefik/secrets/
              readOnly: true
            - name: acme
              mountPath: /acme/
            - name: logs
              mountPath: /logs/
            - name: plugins
              mountPath: /plugins-storage/
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 443
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 443
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: traefik-config
        - name: secrets
          secret:
            secretName: traefik-secret
        - name: acme
          persistentVolumeClaim:
            claimName: traefik-acme
        - name: logs
          persistentVolumeClaim:
            claimName: traefik-logs
        - name: plugins
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  namespace: server
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: server
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - port: 443
      targetPort: websecure
      name: websecure
      protocol: TCP
    - port: 8082
      targetPort: metrics
      name: metrics
      protocol: TCP
