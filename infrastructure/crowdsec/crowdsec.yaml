apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-data
  namespace: server
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: server
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-config
  namespace: server
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: server
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: server
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec
        app.kubernetes.io/component: security
        app.kubernetes.io/part-of: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6060"
    spec:
      containers:
        - name: crowdsec
          image: crowdsecurity/crowdsec
          ports:
            - containerPort: 6060
              name: metrics
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-crs crowdsecurity/appsec-generic-rules MariuszKociubinski/bitwarden"
          volumeMounts:
            - name: traefik-logs
              mountPath: /var/log/traefik
              readOnly: true
            - name: crowdsec-data
              mountPath: /var/lib/crowdsec/data
            - name: crowdsec-config
              mountPath: /etc/crowdsec
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
      volumes:
        - name: traefik-logs
          persistentVolumeClaim:
            claimName: traefik-logs
        - name: crowdsec-data
          persistentVolumeClaim:
            claimName: crowdsec-data
        - name: crowdsec-config
          persistentVolumeClaim:
            claimName: crowdsec-config
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec
  namespace: server
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: crowdsec
  ports:
    - port: 8080
      targetPort: 8080
      name: lapi
    - port: 7422
      targetPort: 7422
      name: appsec
