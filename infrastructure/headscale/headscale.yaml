apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: headscale-data
  namespace: server
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: server
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: server
data:
  config.yaml: |
    server_url: https://headscale.d-f.dev
    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: ""
    grpc_listen_addr: 127.0.0.1:50443
    grpc_allow_insecure: false

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      server:
        enabled: false
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      paths: []
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: false

    node:
      expiry: 0
      ephemeral:
        inactivity_timeout: 30m

    database:
      type: sqlite
      sqlite:
        path: /var/lib/headscale/db.sqlite
        write_ahead_log: true

    log:
      level: info
      format: text

    policy:
      mode: database

    dns:
      magic_dns: false
      override_local_dns: false
      nameservers:
        global: []
      search_domains: []
      extra_records: []

    unix_socket: /var/run/headscale/headscale.sock
    unix_socket_permission: "0770"

    logtail:
      enabled: false

    randomize_client_port: false

    taildrop:
      enabled: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale
  namespace: server
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale
        app.kubernetes.io/component: infrastructure
        app.kubernetes.io/part-of: server
    spec:
      containers:
        - name: headscale
          image: headscale/headscale:v0.25.1
          args:
            - serve
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /var/lib/headscale
            - name: run
              mountPath: /var/run/headscale
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: headscale-config
        - name: data
          persistentVolumeClaim:
            claimName: headscale-data
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: headscale
  namespace: server
  labels:
    app.kubernetes.io/name: headscale
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: headscale
  ports:
    - name: http
      port: 8080
      targetPort: http
