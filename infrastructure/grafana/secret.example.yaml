apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: server
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
    app.kubernetes.io/part-of: server
type: Opaque
stringData:
  ADMIN_PASSWORD: "change-me-grafana-admin"
  # Create an OAuth2 application in Authentik for Grafana,
  # then paste the client ID and secret here.
  OAUTH_CLIENT_ID: "change-me-grafana-client-id"
  OAUTH_CLIENT_SECRET: "change-me-grafana-client-secret"
