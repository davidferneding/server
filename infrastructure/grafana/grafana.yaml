              }
            },
            {
              "id": "calculateField",
              "options": {
                "alias": "Difference",
                "binary": {
                  "left": {
                    "matcher": {
                      "id": "byName",
                      "options": "Difference"
                    }
                  },
                  "operator": "*",
                  "right": {
                    "fixed": "-1"
                  }
                },
                "mode": "binary",
                "reduce": {
                  "reducer": "sum"
                },
                "replaceFields": false
              }
            },
            {
              "id": "rowsToFields",
              "options": {
                "mappings": [
                  {
                    "fieldName": "service",
                    "handlerKey": "field.name"
                  },
                  {
                    "fieldName": "running",
                    "handlerKey": "field.value"
                  },
                  {
                    "fieldName": "Difference",
                    "handlerArguments": {
                      "threshold": {
                        "color": "#F2495C"
                      }
                    },
                    "handlerKey": "field.label"
                  },
                  {
                    "fieldName": "spec",
                    "handlerKey": "__ignore"
                  }
                ]
              }
            }
