            {
              "filter": {
                "id": "byRefId",
                "options": "/^(?:A)$/"
              },
              "id": "organize",
              "options": {
                "excludeByName": {},
                "includeByName": {},
                "indexByName": {},
                "renameByName": {
                  "Value #A": "running"
                }
              },
              "topic": "series"
            },
            {
              "id": "joinByField",
              "options": {
                "byField": "service",
                "mode": "outerTabular"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "cumulative": {
                  "field": "running",
                  "reducer": "sum"
                },
                "mode": "reduceRow",
                "reduce": {
                  "include": [
                    "running",
                    "spec"
