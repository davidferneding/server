apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: server
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: server
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<EOSQL
      CREATE USER paperless WITH ENCRYPTED PASSWORD '${PAPERLESS_DB_PASSWORD}';
      CREATE DATABASE paperless OWNER paperless;
      GRANT ALL PRIVILEGES ON DATABASE paperless TO paperless;
      \c paperless
      GRANT ALL ON SCHEMA public TO paperless;

      CREATE USER mealie WITH ENCRYPTED PASSWORD '${MEALIE_DB_PASSWORD}';
      CREATE DATABASE mealie OWNER mealie;
      GRANT ALL PRIVILEGES ON DATABASE mealie TO mealie;
      \c mealie
      GRANT ALL ON SCHEMA public TO mealie;

      CREATE USER authentik WITH ENCRYPTED PASSWORD '${AUTHENTIK_DB_PASSWORD}';
      CREATE DATABASE authentik OWNER authentik;
      GRANT ALL PRIVILEGES ON DATABASE authentik TO authentik;
      \c authentik
      GRANT ALL ON SCHEMA public TO authentik;
    EOSQL
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: server
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: server
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgresql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      containers:
        - name: postgresql
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PAPERLESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PAPERLESS_DB_PASSWORD
            - name: MEALIE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: MEALIE_DB_PASSWORD
            - name: AUTHENTIK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: AUTHENTIK_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          ports:
            - containerPort: 9187
          env:
            - name: DATA_SOURCE_URI
              value: "localhost:5432/postgres?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: "postgres"
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: init-scripts
          configMap:
            name: postgresql-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: server
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - port: 5432
      targetPort: 5432
