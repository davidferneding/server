# Traefik forward-auth middleware for Authentik
# Use this middleware on IngressRoutes to require login for services
# that don't support OIDC natively (e.g., Uptime Kuma, Plant-it).
#
# Services with native OIDC support (Grafana, Paperless, Mealie) should
# use Authentik as an OIDC provider directly — no forward-auth needed.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-auth
  namespace: server
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: middleware
    app.kubernetes.io/part-of: server
spec:
  forwardAuth:
    address: http://authentik:9000/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
