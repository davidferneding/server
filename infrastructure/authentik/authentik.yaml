apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: server
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2025.8.6
          args: ["server"]
          ports:
            - containerPort: 9000
              name: http
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: AUTHENTIK_DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: server
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authentik
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2025.8.6
          args: ["worker"]
          envFrom:
            - configMapRef:
                name: authentik-config
          env:
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: AUTHENTIK_SECRET_KEY
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: AUTHENTIK_DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-config
  namespace: server
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: server
data:
  AUTHENTIK_POSTGRESQL__HOST: "postgresql"
  AUTHENTIK_POSTGRESQL__PORT: "5432"
  AUTHENTIK_POSTGRESQL__USER: "authentik"
  AUTHENTIK_POSTGRESQL__NAME: "authentik"
  AUTHENTIK_REDIS__HOST: "redis"
  AUTHENTIK_REDIS__PORT: "6379"
  AUTHENTIK_REDIS__DB: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: server
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: server
  ports:
    - port: 9000
      targetPort: 9000
      name: http
