# Flux CD reconciles this Kustomization against the cluster.
# Secrets are SOPS-encrypted with age and decrypted automatically by Flux.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespace
  - namespace.yaml

  # Infrastructure - Databases
  - infrastructure/postgresql/secret.yaml
  - infrastructure/postgresql/postgresql.yaml
  - infrastructure/mysql/secret.yaml
  - infrastructure/mysql/mysql.yaml
  - infrastructure/redis/redis.yaml

  # Infrastructure - Networking & Security
  - infrastructure/traefik/rbac.yaml
  - infrastructure/traefik/secret.yaml
  - infrastructure/traefik/configmap.yaml
  - infrastructure/traefik/traefik.yaml
  - infrastructure/traefik/middlewares.yaml
  - infrastructure/traefik/ingressroute-shorty.yaml
  - infrastructure/crowdsec/crowdsec.yaml

  # Identity Provider
  - infrastructure/authentik/secret.yaml
  - infrastructure/authentik/authentik.yaml
  - infrastructure/authentik/middleware.yaml
  - infrastructure/authentik/ingressroute.yaml

  # Monitoring
  - infrastructure/prometheus/prometheus.yaml
  - infrastructure/prometheus/node-exporter.yaml
  - infrastructure/grafana/secret.yaml
  - infrastructure/grafana/grafana.yaml
  - infrastructure/grafana/ingressroute.yaml

  # Applications
  - apps/paperless/secret.yaml
  - apps/paperless/paperless.yaml
  - apps/paperless/gotenberg.yaml
  - apps/paperless/tika.yaml
  - apps/paperless/ingressroute.yaml
  - apps/vaultwarden/vaultwarden.yaml
  - apps/vaultwarden/ingressroute.yaml
  - apps/mealie/secret.yaml
  - apps/mealie/mealie.yaml
  - apps/mealie/ingressroute.yaml
  - apps/uptime-kuma/uptime-kuma.yaml
  - apps/uptime-kuma/ingressroute.yaml
  - apps/plant-it/secret.yaml
  - apps/plant-it/plant-it.yaml
  - apps/plant-it/ingressroute.yaml

  # Backup
  - backup/secret.yaml
  - backup/backup.yaml

  # Network Policies
  - policies/default-deny.yaml
  - policies/databases.yaml
  - policies/infrastructure.yaml
  - policies/apps.yaml
  - policies/monitoring.yaml
