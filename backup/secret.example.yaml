apiVersion: v1
kind: Secret
metadata:
  name: backup-secret
  namespace: server
  labels:
    app.kubernetes.io/name: backup
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: server
type: Opaque
stringData:
  GPG_PASSPHRASE: "change-me-gpg-passphrase"
  # rclone configuration file — defines the "backup" remote.
  # Current: Dropbox. To switch to Backblaze B2, comment out the
  # [backup] Dropbox block and uncomment the B2 block below.
  rclone.conf: |
    # === ACTIVE: Dropbox ===
    [backup]
    type = dropbox
    client_id = change-me-dropbox-app-key
    client_secret = change-me-dropbox-app-secret
    token = {"access_token":"change-me","token_type":"bearer","refresh_token":"change-me-refresh-token","expiry":"2024-01-01T00:00:00.000Z"}

    # === READY: Backblaze B2 (uncomment to switch) ===
    # [backup]
    # type = b2
    # account = change-me-b2-application-key-id
    # key = change-me-b2-application-key
    # hard_delete = true
