# Paperless: allow from Traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-paperless
  namespace: server
  labels:
    app.kubernetes.io/component: policy
    app.kubernetes.io/part-of: server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: paperless
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000
      from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
---
