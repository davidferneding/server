apiVersion: v1
kind: Secret
metadata:
  name: mealie-secret
  namespace: server
  labels:
    app.kubernetes.io/name: mealie
    app.kubernetes.io/component: secret
    app.kubernetes.io/part-of: server
stringData:
  SMTP_PASSWORD: "change-me-smtp-password"
  # Create an OAuth2 application in Authentik for Mealie,
  # then paste the client ID and secret here.
  OIDC_CLIENT_ID: "change-me-mealie-client-id"
  OIDC_CLIENT_SECRET: "change-me-mealie-client-secret"
