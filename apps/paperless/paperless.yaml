apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-media
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: paperless-config
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: server
data:
  PAPERLESS_REDIS: "redis://redis:6379"
  PAPERLESS_DBHOST: "postgresql"
  PAPERLESS_DBNAME: "paperless"
  PAPERLESS_DBUSER: "paperless"
  PAPERLESS_TIKA_ENABLED: "1"
  PAPERLESS_TIKA_GOTENBERG_ENDPOINT: "http://paperless-gotenberg:3000"
  PAPERLESS_TIKA_ENDPOINT: "http://paperless-tika:9998"
  PAPERLESS_URL: "https://paperless.d-f.dev"
  PAPERLESS_TIME_ZONE: "Europe/Berlin"
  PAPERLESS_OCR_LANGUAGE: "deu"
  USERMAP_UID: "1000"
  USERMAP_GID: "1000"
  # Authentik OIDC
  PAPERLESS_SOCIALACCOUNT_PROVIDERS: '{"openid_connect":{"APPS":[{"provider_id":"authentik","name":"Authentik","settings":{"server_url":"https://auth.d-f.dev/application/o/paperless/.well-known/openid-configuration"}}]}}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: server
    spec:
      containers:
        - name: paperless
          image: ghcr.io/paperless-ngx/paperless-ngx:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: paperless-config
          env:
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: PAPERLESS_DB_PASSWORD
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: paperless-secret
                  key: PAPERLESS_SECRET_KEY
            - name: PAPERLESS_PORT
              value: "8000"
          volumeMounts:
            - name: paperless-data
              mountPath: /usr/src/paperless/data
            - name: paperless-media
              mountPath: /usr/src/paperless/media
            - name: paperless-export
              mountPath: /usr/src/paperless/export
            - name: paperless-consume
              mountPath: /usr/src/paperless/consume
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: paperless-data
          persistentVolumeClaim:
            claimName: paperless-data
        - name: paperless-media
          persistentVolumeClaim:
            claimName: paperless-media
        - name: paperless-export
          persistentVolumeClaim:
            claimName: paperless-export
        - name: paperless-consume
          persistentVolumeClaim:
            claimName: paperless-consume
---
apiVersion: v1
kind: Service
metadata:
  name: paperless
  namespace: server
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: paperless
  ports:
    - port: 8000
      targetPort: 8000
