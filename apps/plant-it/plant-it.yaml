apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plant-it-data
  namespace: server
  labels:
    app.kubernetes.io/name: plant-it
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: plant-it-config
  namespace: server
  labels:
    app.kubernetes.io/name: plant-it
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: server
data:
  MYSQL_HOST: "mysql"
  MYSQL_PORT: "3306"
  MYSQL_USERNAME: "root"
  MYSQL_DATABASE: "bootdb"
  JWT_EXP: "1"
  USERS_LIMIT: "-1"
  UPLOAD_DIR: "/upload-dir"
  API_PORT: "8080"
  FLORACODEX_KEY: ""
  LOG_LEVEL: "DEBUG"
  ALLOWED_ORIGINS: "*"
  CACHE_TTL: "86400"
  CACHE_HOST: "redis"
  CACHE_PORT: "6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-it
  namespace: server
  labels:
    app.kubernetes.io/name: plant-it
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: plant-it
  template:
    metadata:
      labels:
        app.kubernetes.io/name: plant-it
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: server
    spec:
      containers:
        - name: plant-it
          image: ghcr.io/mdeluise/plant-it-server:0.10.0
          ports:
            - name: frontend
              containerPort: 3000
            - name: api
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: plant-it-config
          env:
            - name: MYSQL_PSW
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plant-it-secret
                  key: JWT_SECRET
          volumeMounts:
            - name: plant-it-data
              mountPath: /upload-dir
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/info/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/info/ping
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: plant-it-data
          persistentVolumeClaim:
            claimName: plant-it-data
---
apiVersion: v1
kind: Service
metadata:
  name: plant-it
  namespace: server
  labels:
    app.kubernetes.io/name: plant-it
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: plant-it
  ports:
    - name: frontend
      port: 3000
      targetPort: 3000
    - name: api
      port: 8080
      targetPort: 8080
