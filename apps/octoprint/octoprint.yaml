apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: octoprint-data
  namespace: server
  labels:
    app.kubernetes.io/name: octoprint
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octoprint
  namespace: server
  labels:
    app.kubernetes.io/name: octoprint
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: octoprint
  template:
    metadata:
      labels:
        app.kubernetes.io/name: octoprint
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: server
    spec:
      securityContext:
        fsGroup: 1000
        supplementalGroups:
          - 20
      nodeSelector:
        server.d-f.dev/node-role: pi
      tolerations:
        - key: server.d-f.dev/node-role
          operator: Equal
          value: pi
          effect: NoSchedule
      containers:
        - name: octoprint
          image: octoprint/octoprint:1.11.7
          ports:
            - containerPort: 80
          env:
            - name: TZ
              value: Europe/Berlin
            - name: ENABLE_MJPG_STREAMER
              value: "false"
          volumeMounts:
            - name: data
              mountPath: /octoprint
            - name: host-dev
              mountPath: /host/dev
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: octoprint-data
        - name: host-dev
          hostPath:
            path: /dev
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: octo-print
  namespace: server
  labels:
    app.kubernetes.io/name: octoprint
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: octoprint
  ports:
    - port: 80
      targetPort: 80
