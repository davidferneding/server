apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-demo
  namespace: server
  labels:
    app.kubernetes.io/name: pi-demo
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pi-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pi-demo
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: server
    spec:
      nodeSelector:
        server.d-f.dev/node-role: pi
      tolerations:
        - key: server.d-f.dev/node-role
          operator: Equal
          value: pi
          effect: NoSchedule
      containers:
        - name: pi-demo
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /www
              cat <<EOF >/www/index.html
              pi-demo
              node: ${NODE_NAME}
              pod: ${POD_NAME}
              ip: ${POD_IP}
              EOF
              exec httpd -f -p 8080 -h /www
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: pi-demo
  namespace: server
  labels:
    app.kubernetes.io/name: pi-demo
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pi-demo
  ports:
    - port: 8080
      targetPort: 8080
